<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte al Gran Día - Beatriz & Juan Antonio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Special+Elite&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-pasaporte: #1a2a3a; 
            --dorado: #c5a059; 
            --fondo-papel: #f7f4eb; 
            --rojo-sello: #a94442; 
            --texto: #2c3e50;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--azul-pasaporte);
            color: var(--texto);
            line-height: 1.6;
            text-align: center;
        }

        /*--- PORTADA ---*/
        .portada {
            background: radial-gradient(circle, #2c3e50 0%, var(--azul-pasaporte) 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--dorado);
            padding: 20px;
            border: 15px solid rgba(197, 160, 89, 0.2);
        }

        .icono-pasaporte {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .portada h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-weight: 400;
        }

        .portada h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 4.5rem;
            margin: 20px 0;
            color: #ffffff;
            text-shadow: 0px 0px 10px rgba(197, 160, 89, 0.5);
        }

        .fecha-pasaporte {
            font-family: 'Special Elite', monospace;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 5px;
            border: 2px dashed var(--dorado);
            color: var(--dorado);
            margin-top: 20px;
        }

        /*--- CUERPO INTERIOR ---*/
        .interior {
            background-color: var(--fondo-papel);
            background-image: radial-gradient(rgba(197, 160, 89, 0.05) 15%, transparent 16%);
            background-size: 20px 20px;
            padding: 60px 20px;
        }

        .seccion {
            max-width: 800px;
            margin: 0 auto 50px auto;
        }

        .seccion h2 {
            font-family: 'Special Elite', monospace;
            font-size: 2rem;
            color: var(--azul-pasaporte);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            border-bottom: 3px solid var(--dorado);
            padding-bottom: 5px;
        }

        /*--- TARJETA DE EMBARQUE ---*/
        .boarding-pass {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #e2dbcb;
            display: flex;
            flex-direction: column;
            margin-top: 20px;
            position: relative;
        }

        .boarding-pass::before {
            content: '';
            position: absolute;
            left: 0; right: 0; top: 0;
            height: 15px;
            background: repeating-linear-gradient(45deg, #2c3e50, #2c3e50 10px, #fff 10px, #fff 20px, var(--rojo-sello) 20px, var(--rojo-sello) 30px, #fff 30px, #fff 40px);
        }

        .bp-header {
            background-color: var(--azul-pasaporte);
            color: white;
            padding: 25px 20px 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bp-header h3 {
            font-family: 'Special Elite', monospace;
            letter-spacing: 2px;
            color: var(--dorado);
        }

        .bp-body {
            padding: 30px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
