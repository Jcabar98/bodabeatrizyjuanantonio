<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte al Gran Día - Beatriz & Juan Antonio</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Special+Elite&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #1a2a3a; --dorado: #c5a059; --papel: #f7f4eb; }
        body { font-family: 'Montserrat', sans-serif; background: var(--azul); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        h1 { font-family: 'Alex Brush', cursive; color: var(--azul); font-size: 3rem; margin-bottom: 20px; }
        .info-box { background: var(--papel); padding: 15px; border-radius: 5px; margin-bottom: 25px; border-left: 4px solid var(--dorado); text-align: left; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9rem; text-transform: uppercase; color: var(--azul); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        .dynamic-field { margin-top: 10px; }
        .btn-enviar { width: 100%; padding: 15px; background: var(--azul); color: white; border: none; font-size: 1.1rem; cursor: pointer; border-radius: 5px; font-family: 'Special Elite', monospace; }
        .btn-enviar:hover { background: var(--dorado); }
    </style>
</head>
<body>

<div class="container">
    <h1>Beatriz & Juan Antonio</h1>
    
    <div class="info-box">
        <strong>Ceremonia:</strong> 12:30 h - Iglesia de San Pablo (Úbeda)<br>
        <strong>Convite:</strong> 14:45 h - Restaurante Vandelvira (Baeza)
    </div>

    <form action="https://formsubmit.co/mkoeagev" method="POST">
        <input type="hidden" name="_subject" value="¡Nueva confirmación de asistencia!">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <div class="form-group">
            <label>¿Cuántos asientos reserváis?</label>
            <select name="Asientos" id="asientos" onchange="generarCampos(this.value)">
                <option value="1">1 asiento</option>
                <option value="2">2 asientos</option>
                <option value="3">3 asientos</option>
                <option value="4">4 asientos</option>
                <option value="5">5 asientos</option>
            </select>
        </div>

        <div class="form-group">
            <label>Nombres de los asistentes</label>
            <div id="campos-nombres">
                <input type="text" name="Nombre_1" placeholder="Nombre completo del pasajero 1" required>
            </div>
        </div>

        <div class="form-group">
            <label>Opción de Autobús</label>
            <select name="Autobus">
                <option value="Autobus 1">Autobús 1 (Salida Jaén 11:30h)</option>
                <option value="Autobus 2">Autobús 2 (Úbeda al acabar ceremonia)</option>
                <option value="Ninguno">No necesito autobús</option>
            </select>
        </div>

        <button type="submit" class="btn-enviar">ENVIAR VALIDACIÓN</button>
    </form>
</div>

<script>
    function generarCampos(num) {
        const container = document.getElementById('campos-nombres');
        container.innerHTML = '';
        for (let i = 1; i <= num; i++) {
            container.innerHTML += `<div class="dynamic-field"><input type="text" name="Nombre_${i}" placeholder="Nombre completo del pasajero ${i}" required></div>`;
        }
    }
</script>

</body>
</html>
